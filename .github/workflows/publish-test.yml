name: Publish Test

on:
  pull_request:
    types:
      - opened
      - edited        # disparado quando o corpo do PR é editado
      - synchronize   # disparado quando há push no branch do PR

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
    steps:
      - name: Check PR body for "publish"
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          if [[ "$PR_BASE" == "dev" && "$PR_BODY" == *"publish"* ]]; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check-trigger
    if: needs.check-trigger.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: test-pypi     # configure o environment no repositório
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distribution
        run: uv build

      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/
